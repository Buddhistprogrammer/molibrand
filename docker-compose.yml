# ============================================================
# AI品牌咨询服务产品 — 本地/单机部署编排
# 参考 Architecture.md 第10章「部署方案」
#
# 生产环境中 MySQL 使用阿里云 RDS（外部），本文件内置一个
# mysql 服务仅用于本地开发，可通过 profiles 关闭。
# ============================================================

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build: ./backend
    env_file:
      - .env
    environment:
      - PG_HOST=postgres
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=${PG_DB:-brand_consult}
      - POSTGRES_USER=${PG_USER:-brand_app}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-brand_app_pwd}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/pg_init.sql:/docker-entrypoint-initdb.d/pg_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-brand_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  # 本地开发用 MySQL；生产改用阿里云 RDS，把 MYSQL_HOST 指向 RDS 地址即可
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${MYSQL_DB:-brand_consult}
      - MYSQL_USER=${MYSQL_USER:-brand_app}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-brand_app_pwd}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_pwd}
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/mysql_init.sql:/docker-entrypoint-initdb.d/mysql_init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root_pwd}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  mysqldata:
